name: Bulk Sync Docker Images from File

on:
  push:
    paths:
      - 'images.txt'  # 只有当 images.txt 文件发生变动时才自动触发，防止盲目运行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Aliyun ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ALIYUN_REGISTRY }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Read file and Loop Push
      run: |
        # 确保文件存在
        if [ ! -f "images.txt" ]; then
          echo "images.txt 文件不存在！"
          exit 1
        fi

        # 循环读取文件的每一行
        while IFS= read -r line || [ -n "$line" ]; do
          # 过滤空行和以 # 开头的注释行
          [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
          
          FOREIGN_IMAGE=$(echo "$line" | xargs) # 去除两端空格
          PURE_NAME=$(echo "$FOREIGN_IMAGE" | awk -F'/' '{print $NF}')
          DOMESTIC_IMAGE="${{ secrets.ALIYUN_REGISTRY }}/mlfsyz/${PURE_NAME}"
          
          echo "--------------------------------------------------"
          echo "开始同步: $FOREIGN_IMAGE"
          echo "目标地址: $DOMESTIC_IMAGE"
          echo "--------------------------------------------------"
          
          if docker pull $FOREIGN_IMAGE; then
            docker tag $FOREIGN_IMAGE $DOMESTIC_IMAGE
            docker push $DOMESTIC_IMAGE
            echo "同步成功: $PURE_NAME"
          else
            echo "错误: 拉取海外镜像失败 $FOREIGN_IMAGE"
          fi
          
        done < images.txt
